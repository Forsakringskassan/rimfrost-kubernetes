replicaCount: 1

quarkusDefaults:
  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "1Gi"
      cpu: "500m"

strimzi:
  enabled: true

postgresql:
  enabled: true
  auth:
    database: rimfrost-test
    username: rimfrost-test
    password: rimfrost-test

kafka:
  enabled: true
  name: dev-kafka
  version: "3.9.1"
  topic: handlaggning-done


quarkus:
  - name: folkbokford
    image:
      repository: ghcr.io/forsakringskassan/folkbokford
      tag: 1.0.0
    waitForKafka: false
  - name: arbetsgivare
    image:
      repository: ghcr.io/forsakringskassan/arbetsgivare
      tag: 1.0.0
    waitForKafka: false
  - name: referensdata
    image:
      repository: ghcr.io/forsakringskassan/rimfrost-service-referensdata
      tag: 1.0.0
    waitForKafka: false
  - name: erbjudande-topic
    image:
      repository: ghcr.io/forsakringskassan/rimfrost-service-erbjudande-topic
      tag: 0.0.1
    waitForKafka: false
  - name: uppgiftslager
    image:
      repository: ghcr.io/forsakringskassan/rimfrost-operativt-uppgiftslager
      tag: 1.2.0
    env:
      - name: MP_MESSAGING_CONNECTOR_SMALLRYE_KAFKA_BOOTSTRAP_SERVERS
        value: "dev-kafka-kafka-bootstrap:9092"
      - name: MP_MESSAGING_CONNECTOR_SMALLRYE_KAFKA_ALLOW_AUTO_CREATE_TOPICS
        value: "true"
      - name: DB_URL
        value: "jdbc:postgresql://rimfrost-k8s-postgresql:5432/rimfrost-test"
      - name: DB_USERNAME
        value: "rimfrost-test"
      - name: DB_PASSWORD
        value: "rimfrost-test"
    waitForKafka: true
  - name: vah
    image:
      repository: ghcr.io/forsakringskassan/rimfrost-vard-av-husdjur
      tag: 1.1.3
    env:
      - name: MP_MESSAGING_CONNECTOR_SMALLRYE_KAFKA_BOOTSTRAP_SERVERS
        value: "dev-kafka-kafka-bootstrap:9092"
      - name: MP_MESSAGING_CONNECTOR_SMALLRYE_KAFKA_ALLOW_AUTO_CREATE_TOPICS
        value: "true"
      - name: DB_URL
        value: "jdbc:postgresql://rimfrost-k8s-postgresql:5432/rimfrost-test"
      - name: DB_USERNAME
        value: "rimfrost-test"
      - name: DB_PASSWORD
        value: "rimfrost-test"
    waitForKafka: true
    waitForPostgres: true
  - name: rtf-maskinell
    image:
      repository: ghcr.io/forsakringskassan/rimfrost-regel-rtf-maskinell
      tag: 1.1.2
    env:
      - name: MP_MESSAGING_CONNECTOR_SMALLRYE_KAFKA_BOOTSTRAP_SERVERS
        value: "dev-kafka-kafka-bootstrap:9092"
      - name: MP_MESSAGING_CONNECTOR_SMALLRYE_KAFKA_ALLOW_AUTO_CREATE_TOPICS
        value: "true"
      - name: RIMFROST_FRAMEWORK_REGEL_MASKINELL_RETRY_INTERVALS
        value: 1
    waitForKafka: true
  - name: rtf-manuell
    image:
      repository: ghcr.io/forsakringskassan/rimfrost-regel-rtf-manuell
      tag: 1.2.4
    env:
      - name: MP_MESSAGING_CONNECTOR_SMALLRYE_KAFKA_BOOTSTRAP_SERVERS
        value: "dev-kafka-kafka-bootstrap:9092"
      - name: MP_MESSAGING_CONNECTOR_SMALLRYE_KAFKA_ALLOW_AUTO_CREATE_TOPICS
        value: "true"
      - name: JAVA_TOOL_OPTIONS
        value: "-agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5005"
      - name: DB_URL
        value: "jdbc:postgresql://rimfrost-k8s-postgresql:5432/rimfrost-test"
      - name: DB_USERNAME
        value: "rimfrost-test"
      - name: DB_PASSWORD
        value: "rimfrost-test"
    waitForKafka: true
    waitForPostgres: true
  - name: bekraftabeslut
    image:
      repository: ghcr.io/forsakringskassan/rimfrost-regel-bekraftabeslut
      tag: 1.1.4
    env:
      - name: MP_MESSAGING_CONNECTOR_SMALLRYE_KAFKA_BOOTSTRAP_SERVERS
        value: "dev-kafka-kafka-bootstrap:9092"
      - name: MP_MESSAGING_CONNECTOR_SMALLRYE_KAFKA_ALLOW_AUTO_CREATE_TOPICS
        value: "true"
      - name: DB_URL
        value: "jdbc:postgresql://rimfrost-k8s-postgresql:5432/rimfrost-test"
      - name: DB_USERNAME
        value: "rimfrost-test"
      - name: DB_PASSWORD
        value: "rimfrost-test"
    waitForKafka: true
    waitForPostgres: true
  - name: handlaggning
    image:
      repository: ghcr.io/forsakringskassan/rimfrost-service-handlaggning
      tag: 1.2.0
    env:
      - name: MP_MESSAGING_CONNECTOR_SMALLRYE_KAFKA_BOOTSTRAP_SERVERS
        value: "dev-kafka-kafka-bootstrap:9092"
      - name: MP_MESSAGING_CONNECTOR_SMALLRYE_KAFKA_ALLOW_AUTO_CREATE_TOPICS
        value: "true"
    waitForKafka: true

ingress:
  enabled: true
  className: "nginx"
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
  hosts:
    - paths:
        - path: /api
          pathType: Prefix
          backend: quarkus
