name: Smoke Integration Tests

on:
  workflow_dispatch:

jobs:
  integration-tests:
    name: Run Smoke Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      GITHUB_ACTOR: ${{ secrets.PACKAGES_RW_ACTOR }}
      GITHUB_TOKEN: ${{ secrets.PACKAGES_RW_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      # --- Install kubectl ---
      - name: Install kubectl
        run: |
          curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/

      # --- Install Minikube ---
      - name: Install Minikube
        run: |
          curl -Lo minikube https://storage.googleapis.com/minikube/releases/latest/minikube-linux-amd64
          chmod +x minikube
          sudo mv minikube /usr/local/bin/

      # --- Install Helm ---
      - name: Install Helm
        run: |
          curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

      # --- Run integration tests ---
      - name: Run Maven verify
        run: mvn -s settings.xml verify

      # --- Optional: Dump logs on failure ---
      - name: Dump Kubernetes logs
        if: failure()
        run: |
          kubectl get all -A
          kubectl describe pods -A
          kubectl logs -A --tail=100